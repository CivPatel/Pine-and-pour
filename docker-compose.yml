name: pine-and-pour

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pinepour
      POSTGRES_USER: postgres
      # Required; set in your local `.env` (not committed)
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD not set}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    build:
      context: ./PinePour.Api
      dockerfile: Dockerfile
    depends_on:
      - db
      - web
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Database__Provider: Postgres
      ConnectionStrings__DataContext: Host=db;Port=5432;Database=pinepour;Username=postgres;Password=${POSTGRES_PASSWORD}
      Spa__DevServerUrl: http://web:5173
      Stripe__SecretKey: ${STRIPE_SECRET_KEY:-}
      Seed__EnableSampleData: ${SEED_ENABLE_SAMPLE_DATA:-false}
      Seed__DefaultUserPassword: ${SEED_DEFAULT_USER_PASSWORD:-}
    ports:
      - "8080:8080"

  web:
    build:
      context: ./PinePour.Web
      dockerfile: Dockerfile
    environment:
      VITE_API_PROXY_TARGET: http://api:8080
      VITE_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    ports:
      - "5173:5173"

volumes:
  postgres-data:
